<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Evidence Table</title>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.7/js/jquery.dataTables.min.js"></script>
    <link
      rel="stylesheet"
      href="https://cdn.datatables.net/1.13.7/css/jquery.dataTables.min.css"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div>
      <h1><a href="#">Evidence Table</a></h1>
      <div class="container">
        <table id="evidence-table" class="table-fixed">
          <thead>
            <tr>
              <th>Paper Citation</th>
              <th>Organism</th>
              <th>Cell source</th>
              <th>Cell Type</th>
              <th>Cell State</th>
              <th>Gene</th>
              <th>Gene ID</th>
              <th>Source Type</th>
              <th>Source Rational</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
    </div>

    <script>
      // Data formatting functions
      const formatRow = (citation, evidence) => {
        return `<tr>
            <td><a target="_blank" href="${citation.doi}">${
          citation.citation || "N/A"
        }</a></td>
            <td>${evidence.derived.organism || "N/A"}</td>
            <td>${evidence.derived.cell_source || "N/A"}</td>
            <td>${evidence.derived.cell_type_label || "N/A"}</td>
            <td>${evidence.derived.cell_state || "N/A"}</td>
            <td>${evidence.derived.gene || "N/A"}</td>
            <td>${evidence.derived.gene_id || "N/A"}</td>
            <td>${evidence.source.source_type || "N/A"}</td>
            <td>${evidence.source.source_rationale || "N/A"}</td>
        </tr>`;
      };

      const formatRows = (citation, evidence) => {
        return evidence.map((item) => formatRow(citation, item)).join("");
      };

      // Data loading functions
      const loadFilePair = async (evidencePath, citationPath) => {
        try {
          const [evidenceData, citationData] = await Promise.all([
            $.getJSON(evidencePath),
            $.getJSON(citationPath),
          ]);
          return {
            evidence: evidenceData,
            citation: citationData,
          };
        } catch (error) {
          console.error(
            `Error loading files ${evidencePath} and ${citationPath}:`,
            error
          );
          throw error;
        }
      };

      const loadMultipleFilePairs = async (filePairs) => {
        try {
          const results = await Promise.all(
            filePairs.map(async (pair) => {
              const { evidence, citation } = await loadFilePair(
                pair.evidence,
                pair.citation
              );
              return formatRows(citation, evidence);
            })
          );
          return results.join("");
        } catch (error) {
          console.error("Error loading multiple file pairs:", error);
          throw error;
        }
      };

      // Main execution
      $(document).ready(function () {
        const filePairs = [
          {
            evidence: "../data/adipose_Emont2022/evidence_human/evidence.json",
            citation: "../data/adipose_Emont2022/citation.json",
          },
          {
            evidence: "../data/adipose_Emont2022/evidence_human/evidence.json",
            citation: "../data/adipose_Emont2022/citation.json",
          },
          {
            evidence: "../data/adipose_Vijay2019/evidence_human/evidence.json",
            citation: "../data/adipose_Vijay2019/citation.json",
          },
          {
            evidence: "../data/bladder_Yu2019/evidence_human/evidence.json",
            citation: "../data/bladder_Yu2019/citation.json",
          },
          {
            evidence: "../data/bone_He2021/evidence_human/evidence.json",
            citation: "../data/bone_He2021/citation.json",
          },
          {
            evidence: "../data/eye_Gautam2021/evidence_human/evidence.json",
            citation: "../data/eye_Gautam2021/citation.json",
          },

          {
            evidence: "../data/heart_Tucker2020/evidence_human/evidence.json",
            citation: "../data/heart_Tucker2020/citation.json",
          },
          {
            evidence: "../data/kidney_Wu2018/evidence_human/evidence.json",
            citation: "../data/kidney_Wu2018/citation.json",
          },
          {
            evidence: "../data/adipose_Hildreth2021/evidence_human/evidence.json",
            citation: "../data/adipose_Hildreth2021/citation.json",
          },
          {
            evidence: "../data/adipose_Jaitin2019/evidence_human/evidence.json",
            citation: "../data/adipose_Jaitin2019/citation.json",
          },
          {
            evidence: "../data/adipose_Massier2023/evidence_human/evidence.json",
            citation: "../data/adipose_Massier2023/citation.json",
          },
        ];

        loadMultipleFilePairs(filePairs)
          .then((formattedRows) => {
            $("#evidence-table tbody").append(formattedRows);
            let table = new DataTable("#evidence-table", {
              paging: true,
              searching: true,
              info: true,
              order: [[0, "asc"]],
            });
          })
          .catch((error) => {
            $("#evidence-table tbody").append(
              '<tr><td colspan="9">Error loading data</td></tr>'
            );
          });
      });
    </script>
  </body>
</html>
