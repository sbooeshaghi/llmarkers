<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Evidence Table</title>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.7/js/jquery.dataTables.min.js"></script>
    <link
      rel="stylesheet"
      href="https://cdn.datatables.net/1.13.7/css/jquery.dataTables.min.css"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div>
      <h1><a href="#">Evidence Table</a></h1>
      <div class="container">
        <table id="evidence-table" class="table-fixed">
          <thead>
            <tr>
              <th>Paper Citation</th>
              <th>Organism</th>
              <th>Cell source</th>
              <th>Cell Type</th>
              <th>Cell State</th>
              <th>Gene</th>
              <th>Gene ID</th>
              <th>Source Type</th>
              <th>Source Rational</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
    </div>

    <script>
      $(document).ready(function() {
        $.getJSON("http://127.0.0.1:5000/evidence", function(data) {
          let rows = data.map((item) => `
            <tr>
              <td><a target="_blank" href="${item.doi}">${item.citation || "N/A"}</a></td>
              <td>${item.organsim || "N/A"}</td>
              <td>${item.cell_source || "N/A"}</td>
              <td>${item.cell_type_label || "N/A"}</td>
              <td>${item.cell_state || "N/A"}</td>
              <td>${item.gene || "N/A"}</td>
              <td>${item.gene_id || "N/A"}</td>
              <td>${item.source_type || "N/A"}</td>
              <td>${item.source_rationale || "N/A"}</td>
            </tr>`).join("");
          
          $("#evidence-table tbody").html(rows);

          new DataTable("#evidence-table", {
            paging: true,
            searching: true,
            info: true,
            order: [[0, "asc"]],
          });
        }).fail(function () {
            $("#evidence-table tbody").html('<tr><td colspan="9">Failed to load data</td></tr>');
        });
      });
    </script>
  </body>
</html>
